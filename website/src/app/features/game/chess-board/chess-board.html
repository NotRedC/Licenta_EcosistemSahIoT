<svg viewBox="0 0 800 800" class="chess-svg" preserveAspectRatio="xMinYMin meet"  [class.preview-mode]="isAnalysisActive()">
  @for (row of [0,1,2,3,4,5,6,7]; track row) {
    @for (col of [0,1,2,3,4,5,6,7]; track col) {
      @let squareName = ['a','b','c','d','e','f','g','h'][col] + (8 - row);
      
      <rect [attr.x]="col * 100" [attr.y]="row * 100" width="100" height="100"
            [class.light]="(row + col) % 2 === 0"
            [class.dark]="(row + col) % 2 !== 0"
            [class.selected]="selectedSquare() === squareName"
            [class.hint-piece]="hintSquares().from === squareName"
            [class.hint-target]="hintSquares().to === squareName"
            (click)="handleSquareClick(squareName)" />

      @if (validDestinations().includes(squareName)) {
        <circle [attr.cx]="col * 100 + 50" [attr.cy]="row * 100 + 50" r="15" class="move-hint" (click)="handleSquareClick(squareName)" />
      }
    }
  }

 @for (p of piecesOnBoard(); track p.id) {
        <text
          [attr.x]="p.x * 100 + 50"
          [attr.y]="p.y * 100 + 80"
          class="chess-piece"
          text-anchor="middle"
          (click)="handleSquareClick(p.square)"
        >
          {{ p.icon }}
        </text>
      }

  @for (file of ['a','b','c','d','e','f','g','h']; track file; let i = $index) {
    <text [attr.x]="i * 100 + 85" y="792" class="board-coord file">
      {{ file }}
    </text>
  }

  @for (rank of [8,7,6,5,4,3,2,1]; track rank; let i = $index) {
    <text x="5" [attr.y]="i * 100 + 20" class="board-coord rank">
      {{ rank }}
    </text>
  }
</svg>
